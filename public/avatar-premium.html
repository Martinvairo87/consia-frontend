<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONSIA Avatar Premium</title>
  <meta name="theme-color" content="#050916" />
  <style>
    :root{
      --bg:#050916;
      --bg2:#0a1026;
      --card:rgba(15,23,42,.55);
      --line:rgba(160,180,220,.16);
      --txt:#edf4ff;
      --muted:#a8b7d6;
      --ok:#18d26b;
      --accent1:#78c7ff;
      --accent2:#e3b5ff;
      --accent3:#7d67ff;
      --shadow:0 20px 90px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;color:var(--txt);
      background:
        radial-gradient(900px 600px at 18% -10%, rgba(84,132,255,.22), transparent 55%),
        radial-gradient(700px 500px at 82% 0%, rgba(120,250,255,.12), transparent 42%),
        radial-gradient(700px 500px at 50% 100%, rgba(185,110,255,.12), transparent 45%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Inter,Roboto,Arial,sans-serif;
    }
    .shell{height:100%;display:grid;grid-template-rows:auto 1fr;padding:18px;gap:18px;max-width:1600px;margin:0 auto}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:14px;
      padding:14px 16px;border-radius:20px;background:rgba(6,10,24,.58);backdrop-filter:blur(18px);
      border:1px solid var(--line);box-shadow:var(--shadow)
    }
    .brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:.14em}
    .logo{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.12)}
    .controls{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      border:1px solid var(--line);border-radius:14px;padding:11px 14px;color:var(--txt);background:rgba(255,255,255,.04);
      cursor:pointer;font-weight:800;transition:.2s transform,.2s background
    }
    .btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.08)}
    .btn.primary{background:linear-gradient(135deg,rgba(90,135,255,.28),rgba(125,230,255,.12));border-color:rgba(145,190,255,.28)}
    .layout{display:grid;grid-template-columns:380px 1fr 420px;gap:18px;min-height:0}
    .panel{
      min-height:0;border-radius:28px;background:var(--card);backdrop-filter:blur(18px);border:1px solid var(--line);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column
    }
    .panel-head{padding:18px 18px 0}
    .panel-body{padding:18px;min-height:0;overflow:auto}
    .k{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.16em;font-weight:900}
    h1,h2,h3{margin:0}
    .camera{
      position:relative;border-radius:24px;background:#040812;border:1px solid var(--line);overflow:hidden;aspect-ratio:9/16;margin-top:14px
    }
    video{width:100%;height:100%;object-fit:cover;background:#05070f}
    .cam-badge{position:absolute;top:14px;left:14px;padding:8px 10px;border-radius:999px;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.1);font-size:12px;font-weight:800}
    .center-wrap{display:grid;place-items:center;padding:18px;position:relative;overflow:hidden}
    .avatar-stage{
      width:min(560px,100%);aspect-ratio:1/1;border-radius:40px;position:relative;display:grid;place-items:center;
      background:radial-gradient(circle at 50% 40%, rgba(117,180,255,.22), rgba(0,0,0,0) 40%), linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid var(--line);overflow:hidden
    }
    .halo, .halo2, .halo3{
      position:absolute;border-radius:999px;border:1px solid rgba(255,255,255,.12);mix-blend-mode:screen
    }
    .halo{width:78%;height:78%;box-shadow:0 0 50px rgba(120,190,255,.2), inset 0 0 40px rgba(120,190,255,.12);animation:spin 18s linear infinite}
    .halo2{width:54%;height:54%;border-color:rgba(255,255,255,.16);animation:spin2 13s linear infinite}
    .halo3{width:36%;height:36%;border-color:rgba(200,160,255,.24);animation:pulse 2.4s ease-in-out infinite}
    .avatar-core{
      width:26%;height:26%;border-radius:999px;
      background:radial-gradient(circle at 35% 35%, #ffffff, #8cc9ff 24%, #7b67ff 60%, #090d1c 100%);
      box-shadow:0 0 40px rgba(125,190,255,.45), 0 0 140px rgba(115,88,255,.22);
      animation:breathe 3s ease-in-out infinite
    }
    .eq{
      position:absolute;bottom:18px;left:18px;right:18px;height:90px;display:flex;align-items:flex-end;gap:6px
    }
    .bar{flex:1;min-width:4px;border-radius:999px 999px 4px 4px;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(123,103,255,.42));height:20%}
    .subtitle{position:absolute;top:18px;right:18px;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .tag{padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);font-size:12px;font-weight:800}
    .chat-box{display:grid;gap:12px}
    .message{padding:14px 16px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.04);line-height:1.55;white-space:pre-wrap}
    .message.user{background:rgba(104,154,255,.12)}
    .message.assistant{background:rgba(255,255,255,.05)}
    .composer{display:grid;gap:12px;margin-top:14px}
    textarea,input{
      width:100%;border-radius:18px;border:1px solid var(--line);background:#091022;color:var(--txt);padding:16px;font:inherit
    }
    textarea{min-height:130px;resize:vertical}
    .line{display:flex;gap:10px;flex-wrap:wrap}
    .statusline{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-top:14px;color:var(--muted);font-size:14px}
    .small-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px}
    .mini{padding:14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid var(--line)}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes spin2{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.09);opacity:1}}
    @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    @media (max-width:1280px){.layout{grid-template-columns:1fr}.panel{min-height:unset}.camera{aspect-ratio:16/9}}
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <div class="logo">A</div>
        <div>
          <div style="font-size:12px;color:var(--muted)">CONSIA</div>
          <div>AVATAR PREMIUM</div>
        </div>
      </div>
      <div class="controls">
        <button class="btn" id="backHomeBtn">Inicio</button>
        <button class="btn" id="toggleCameraBtn">Cámara</button>
        <button class="btn" id="toggleMicBtn">Micrófono</button>
        <button class="btn primary" id="speakLastBtn">Hablar última respuesta</button>
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-head">
          <div class="k">Input visual</div>
          <h2 style="margin-top:8px">Cámara en vivo</h2>
        </div>
        <div class="panel-body">
          <div class="camera">
            <video id="cameraPreview" autoplay muted playsinline></video>
            <div class="cam-badge" id="cameraBadge">CAM OFF</div>
          </div>
          <div class="small-grid">
            <div class="mini"><div class="k">API</div><div id="apiLabel" style="margin-top:8px;word-break:break-all"></div></div>
            <div class="mini"><div class="k">Reconocimiento</div><div id="speechStatus" style="margin-top:8px">inactivo</div></div>
            <div class="mini"><div class="k">TTS</div><div id="ttsStatus" style="margin-top:8px">browser</div></div>
            <div class="mini"><div class="k">Modo</div><div style="margin-top:8px">voz + chat + cámara</div></div>
          </div>
        </div>
      </section>

      <section class="panel center-wrap">
        <div class="avatar-stage">
          <div class="subtitle">
            <div class="tag" id="liveTag">LIVE</div>
            <div class="tag" id="voiceTag">VOICE READY</div>
          </div>
          <div class="halo"></div>
          <div class="halo2"></div>
          <div class="halo3" id="pulseHalo"></div>
          <div class="avatar-core" id="avatarCore"></div>
          <div class="eq" id="equalizer"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div class="k">Conversación</div>
          <h2 style="margin-top:8px">CONSIA habla y responde</h2>
        </div>
        <div class="panel-body">
          <div class="chat-box" id="chatBox">
            <div class="message assistant">CONSIA listo. Escribí o usá el micrófono.</div>
          </div>
          <div class="composer">
            <input id="systemContext" placeholder="Contexto opcional (empresa, sitio, campaña, objetivo)" />
            <textarea id="promptBox" placeholder="Decime qué querés que haga CONSIA…"></textarea>
            <div class="line">
              <button class="btn primary" id="sendBtn">Enviar</button>
              <button class="btn" id="listenBtn">Hablar ahora</button>
              <button class="btn" id="clearBtn">Limpiar</button>
            </div>
            <div class="statusline">
              <span id="runtimeStatus">Listo.</span>
              <span id="latencyLabel">—</span>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    (() => {
      const $ = (id) => document.getElementById(id);
      const apiBase = (() => {
        const p = new URLSearchParams(location.search);
        const q = p.get('api');
        if (q) return q.replace(/\/$/, '');
        const saved = localStorage.getItem('CONSIA_API_BASE');
        if (saved) return saved.replace(/\/$/, '');
        return location.hostname.includes('consia.world') || location.hostname.includes('pages.dev') ? 'https://api.consia.world' : location.origin.replace(/\/$/, '');
      })();
      localStorage.setItem('CONSIA_API_BASE', apiBase);
      $('apiLabel').textContent = apiBase;
      $('backHomeBtn').onclick = () => location.href = './index.html';

      const chatBox = $('chatBox');
      const addMsg = (role, text) => {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
      };

      const makeEq = () => {
        $('equalizer').innerHTML = Array.from({length:24}).map(() => '<div class="bar"></div>').join('');
      };
      makeEq();
      const bars = () => [...document.querySelectorAll('.bar')];
      let eqTimer = null;
      const animateEq = (on) => {
        clearInterval(eqTimer);
        if (!on) {
          bars().forEach((b,i) => b.style.height = `${12 + (i % 5) * 6}%`);
          return;
        }
        eqTimer = setInterval(() => {
          bars().forEach(b => b.style.height = `${12 + Math.random() * 76}%`);
        }, 120);
      };
      animateEq(false);

      let stream = null;
      const stopCamera = () => {
        if (stream) stream.getTracks().forEach(t => t.stop());
        stream = null;
        $('cameraPreview').srcObject = null;
        $('cameraBadge').textContent = 'CAM OFF';
      };
      const startCamera = async () => {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'user' }, audio:false });
          $('cameraPreview').srcObject = stream;
          $('cameraBadge').textContent = 'CAM LIVE';
        } catch (e) {
          $('cameraBadge').textContent = 'SIN PERMISO';
        }
      };

      $('toggleCameraBtn').onclick = async () => {
        if (stream) stopCamera(); else await startCamera();
      };

      let recognition = null;
      let recognitionActive = false;
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SR) {
        recognition = new SR();
        recognition.lang = 'es-AR';
        recognition.interimResults = false;
        recognition.continuous = false;
        recognition.onstart = () => {
          recognitionActive = true;
          $('speechStatus').textContent = 'escuchando';
          $('voiceTag').textContent = 'LISTENING';
          $('runtimeStatus').textContent = 'Escuchando…';
          animateEq(true);
        };
        recognition.onend = () => {
          recognitionActive = false;
          $('speechStatus').textContent = 'inactivo';
          $('voiceTag').textContent = 'VOICE READY';
          if (!speechSynthesis.speaking) animateEq(false);
        };
        recognition.onresult = (e) => {
          const text = [...e.results].map(r => r[0].transcript).join(' ').trim();
          $('promptBox').value = text;
          if (text) sendPrompt();
        };
        recognition.onerror = () => {
          $('speechStatus').textContent = 'error';
        };
      } else {
        $('speechStatus').textContent = 'no soportado';
      }

      const speak = (text) => {
        if (!text) return;
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        const voices = speechSynthesis.getVoices();
        const preferred = voices.find(v => /es/i.test(v.lang)) || voices[0];
        if (preferred) u.voice = preferred;
        u.lang = preferred?.lang || 'es-AR';
        u.rate = 1;
        u.pitch = 1;
        u.onstart = () => {
          $('ttsStatus').textContent = 'hablando';
          $('liveTag').textContent = 'SPEAKING';
          animateEq(true);
        };
        u.onend = () => {
          $('ttsStatus').textContent = 'browser';
          $('liveTag').textContent = 'LIVE';
          if (!recognitionActive) animateEq(false);
        };
        speechSynthesis.speak(u);
      };

      let lastAnswer = '';
      $('speakLastBtn').onclick = () => speak(lastAnswer);
      $('toggleMicBtn').onclick = () => {
        if (!recognition) return;
        if (recognitionActive) recognition.stop(); else recognition.start();
      };
      $('listenBtn').onclick = () => {
        if (!recognition) return;
        recognition.start();
      };
      $('clearBtn').onclick = () => {
        $('promptBox').value = '';
        $('systemContext').value = '';
        chatBox.innerHTML = '<div class="message assistant">CONSIA listo. Escribí o usá el micrófono.</div>';
        lastAnswer = '';
      };

      const fetchJson = async (paths, options = {}) => {
        const list = Array.isArray(paths) ? paths : [paths];
        let lastErr = null;
        for (const path of list) {
          try {
            const res = await fetch(`${apiBase}${path}`, options);
            const txt = await res.text();
            let data;
            try { data = JSON.parse(txt); } catch { data = { raw: txt }; }
            if (!res.ok) throw new Error(`${path} → ${res.status} ${txt.slice(0,180)}`);
            return { ok:true, path, data };
          } catch (e) { lastErr = e; }
        }
        return { ok:false, error:String(lastErr?.message || lastErr || 'unknown_error') };
      };

      const getResponseText = (data) => {
        if (!data) return 'Sin respuesta.';
        return data.response || data.answer || data.output || data.text || data.message || data.content || data.raw || JSON.stringify(data);
      };

      async function sendPrompt(){
        const prompt = $('promptBox').value.trim();
        const context = $('systemContext').value.trim();
        if (!prompt) return;
        addMsg('user', prompt);
        $('runtimeStatus').textContent = 'Consultando a CONSIA…';
        const t0 = performance.now();
        const body = JSON.stringify({
          message: prompt,
          prompt,
          input: prompt,
          text: prompt,
          context,
          system: context,
          site: new URLSearchParams(location.search).get('site') || 'consia'
        });
        const r = await fetchJson(['/v1/avatar/from-chat','/v1/chat','/chat'], { method:'POST', headers:{ 'Content-Type':'application/json' }, body });
        const ms = Math.round(performance.now() - t0);
        $('latencyLabel').textContent = `${ms} ms`;
        if (!r.ok) {
          const err = `Error: ${r.error}`;
          addMsg('assistant', err);
          $('runtimeStatus').textContent = 'Error.';
          lastAnswer = err;
          return;
        }
        const text = getResponseText(r.data);
        lastAnswer = text;
        addMsg('assistant', text);
        $('runtimeStatus').textContent = `OK desde ${r.path}`;
        speak(text);
      }

      $('sendBtn').onclick = sendPrompt;
      $('promptBox').addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') sendPrompt();
      });

      speechSynthesis.onvoiceschanged = () => {};
    })();
  </script>
</body>
</html>
