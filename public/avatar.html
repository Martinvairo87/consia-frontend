<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CONSIA AVATAR LIVE</title>

<style>
:root{
  --bg:#05070c;
  --bg2:#0a1020;
  --panel:rgba(10,16,28,.85);
  --line:rgba(120,146,255,.18);
  --text:#eef3ff;
  --muted:#93a0c2;
  --accent:#7aa2ff;
  --accent2:#67e8f9;
  --ok:#73f0b0;
}

*{box-sizing:border-box}
html,body{
  margin:0;
  height:100%;
  font-family:Inter,system-ui;
  background:
    radial-gradient(circle at top left, rgba(122,162,255,.15), transparent 30%),
    radial-gradient(circle at bottom right, rgba(103,232,249,.15), transparent 30%),
    linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
}

/* ORB */
.orb{
  width:240px;
  height:240px;
  border-radius:50%;
  margin:80px auto 40px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  letter-spacing:2px;
  color:#8be9fd;
  background:#02040a;
  border:2px solid rgba(103,232,249,.6);
  box-shadow:
    0 0 40px rgba(103,232,249,.3),
    0 0 80px rgba(103,232,249,.15),
    inset 0 0 30px rgba(103,232,249,.15);
  transition:.3s;
}

.orb.active{
  transform:scale(1.05);
  box-shadow:
    0 0 60px rgba(103,232,249,.6),
    0 0 120px rgba(103,232,249,.3);
}

/* CHAT */
.chat{
  width:90%;
  max-width:900px;
  margin:0 auto;
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:16px;
  border-radius:20px;
  border:1px solid var(--line);
  background:#0b1224;
  color:white;
}

button{
  padding:14px 18px;
  border-radius:20px;
  border:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#000;
  font-weight:600;
  cursor:pointer;
}

/* PANEL */
.panel{
  margin:30px auto;
  width:90%;
  max-width:900px;
  padding:20px;
  border-radius:20px;
  background:var(--panel);
  border:1px solid var(--line);
}

.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.log{
  margin-top:15px;
  height:120px;
  overflow:auto;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="orb" id="orb">CONSIA</div>

<div class="chat">
  <input id="msg" placeholder="decile algo a CONSIA..." />
  <button onclick="send()">Enviar</button>
  <button onclick="voice()">🎤</button>
</div>

<div class="panel">
  <b>CONFIG</b>

  <div class="row">
    <input id="api" value="https://api.consia.world"/>
    <input id="tenant" value="consia"/>
  </div>

  <div class="row">
    <button onclick="health()">Health</button>
    <button onclick="status()">Status</button>
    <button onclick="autopilot()">Autopilot</button>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
const log = (t)=>{
  const el = document.getElementById("log");
  el.innerHTML = `[${new Date().toLocaleTimeString()}] ${t}<br>` + el.innerHTML;
}

const api = ()=> document.getElementById("api").value;

async function send(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;

  document.getElementById("orb").classList.add("active");

  try{
    const r = await fetch(api()+"/v1/chat",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ message: msg })
    });
    const j = await r.json();
    log("AI: "+(j.response||JSON.stringify(j)));
  }catch(e){
    log("ERROR: "+e.message);
  }

  document.getElementById("orb").classList.remove("active");
}

async function health(){
  const r = await fetch(api()+"/v1/health");
  log(await r.text());
}

async function status(){
  const r = await fetch(api()+"/v1/status");
  log(await r.text());
}

async function autopilot(){
  const r = await fetch(api()+"/v1/autopilot/status");
  log(await r.text());
}

/* VOZ SIMPLE */
function voice(){
  const rec = new (window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang="es-AR";

  rec.onresult = e=>{
    document.getElementById("msg").value = e.results[0][0].transcript;
    send();
  };

  rec.start();
}

/* AUTO START */
window.onload = ()=>{
  log("CONSIA AVATAR ACTIVE");
};
</script>

</body>
</html>
