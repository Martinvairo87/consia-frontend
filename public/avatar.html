<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CONSIA AVATAR</title>

<style>
body{
  margin:0;
  background:#05070c;
  color:white;
  font-family:Inter,system-ui;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

#orb{
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle,#7aa2ff,transparent 60%);
  box-shadow:0 0 80px rgba(122,162,255,.6);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.08)}
  100%{transform:scale(1)}
}

button{
  margin-top:30px;
  padding:14px 22px;
  border:none;
  border-radius:12px;
  background:#7aa2ff;
  color:white;
  font-weight:600;
}
</style>
</head>

<body>

<div style="text-align:center">
  <div id="orb"></div>
  <button onclick="start()">Activar CONSIA</button>
</div>

<script>
let pc, dc, audioEl;

async function start(){
  const res = await fetch("https://api.consia.world/v1/realtime/session?tenant=consia");
  const data = await res.json();

  const token = data.session.value;

  pc = new RTCPeerConnection();

  audioEl = document.createElement("audio");
  audioEl.autoplay = true;

  pc.ontrack = e => {
    audioEl.srcObject = e.streams[0];
  };

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  dc = pc.createDataChannel("oai-events");

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  const baseUrl = "https://api.openai.com/v1/realtime";

  const answer = await fetch(`${baseUrl}?model=gpt-realtime`, {
    method: "POST",
    body: offer.sdp,
    headers: {
      Authorization: `Bearer ${token}`,
      "Content-Type": "application/sdp"
    },
  });

  const sdp = await answer.text();
  await pc.setRemoteDescription({ type: "answer", sdp });

  console.log("CONSIA AVATAR ACTIVE");
}
</script>

</body>
</html>
