<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>CONSIA Avatar OS</title>
  <meta
    name="description"
    content="CONSIA Avatar OS - motor propio base sin dependencias externas de avatar o voz."
  />
  <link rel="stylesheet" href="/avatar.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="brand-logo">C</div>
        <div class="brand-text">
          <div class="brand-title">CONSIA AVATAR OS</div>
          <div class="brand-subtitle">Motor propio · voz nativa · realtime base</div>
        </div>
      </div>

      <div class="topbar-actions">
        <div class="status-pill">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Conectando...</span>
        </div>
      </div>
    </header>

    <main class="main-grid">
      <section class="left-panel">
        <div class="card hero-card">
          <div class="hero-head">
            <div>
              <div class="section-kicker">Avatar</div>
              <h1 class="hero-title">CONSIA</h1>
              <p class="hero-subtitle">
                Sistema visual, conversacional y ejecutivo listo para presentación, ventas y operación.
              </p>
            </div>
          </div>

          <div class="avatar-stage">
            <canvas id="avatarCanvas" width="520" height="520" aria-label="CONSIA Avatar"></canvas>
            <div class="avatar-label" id="avatarModeLabel">Modo standby</div>
          </div>

          <div class="hero-controls">
            <button class="btn btn-primary" id="micBtn">🎙️ Activar voz</button>
            <button class="btn btn-secondary" id="presentBtn">▶️ Presentación</button>
            <button class="btn btn-secondary" id="stopBtn">⏹️ Detener voz</button>
            <button class="btn btn-secondary" id="clearBtn">🧹 Limpiar chat</button>
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <div>
              <div class="section-kicker">Comandos</div>
              <div class="card-title">Accesos rápidos</div>
            </div>
          </div>

          <div class="chip-grid">
            <button class="chip" data-quick="Presentate como CONSIA">Presentate</button>
            <button class="chip" data-quick="Qué es CONSIA y qué puede hacer">Qué puede hacer</button>
            <button class="chip" data-quick="Mostrame el modo empresa Manglar">Modo empresa</button>
            <button class="chip" data-quick="Quiero invertir USD 80000 en departamentos en Posadas">Lead inversión</button>
            <button class="chip" data-quick="Necesito construir una casa llave en mano en Posadas">Lead construcción</button>
            <button class="chip" data-quick="Dame un resumen ejecutivo del sistema">Resumen ejecutivo</button>
          </div>
        </div>
      </section>

      <section class="right-panel">
        <div class="card">
          <div class="card-head">
            <div>
              <div class="section-kicker">Presentación</div>
              <div class="card-title">Modo presentación CONSIA</div>
            </div>
          </div>

          <div id="presentationGrid" class="presentation-grid"></div>
        </div>

        <div class="card chat-card">
          <div class="card-head">
            <div>
              <div class="section-kicker">Realtime</div>
              <div class="card-title">Texto + voz</div>
            </div>
          </div>

          <div id="chatBody" class="chat-body"></div>

          <div class="composer-wrap">
            <textarea
              id="msg"
              class="composer-input"
              placeholder="Escribí o hablá con CONSIA..."
              rows="1"
            ></textarea>
            <div class="composer-actions">
              <button class="btn btn-secondary" id="composerMicBtn">🎙️</button>
              <button class="btn btn-primary" id="sendBtn">Enviar</button>
            </div>
          </div>

          <div id="console" class="console-box">CONSIA iniciando...</div>
        </div>
      </section>
    </main>
  </div>

  <script src="/avatar-core.js"></script>
</body>
</html>
