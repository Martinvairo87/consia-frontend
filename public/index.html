<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>CONSIA</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#07080c;
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.container{
max-width:900px;
padding:40px;
}

.logo{
font-size:56px;
font-weight:700;
letter-spacing:2px;
margin-bottom:20px;
}

.subtitle{
font-size:20px;
opacity:.7;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:#111522;
border-radius:14px;
padding:25px;
border:1px solid #1f2636;
transition:.2s;
text-decoration:none;
color:white;
}

.card:hover{
transform:translateY(-4px);
background:#151a29;
}

.card h3{
font-size:18px;
margin-bottom:8px;
}

.card p{
font-size:14px;
opacity:.7;
}

.footer{
margin-top:60px;

opacity:.4;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
CONSIA
</div>

<div class="subtitle">

</div>

<div class="grid">

<a class="card" href="/flights.html">
<h3>Flights</h3>

<a class="card" href="/travel.html">

</a>

<a class="card" href="/marketplace.html">

<p>Comercio global automatizado</p>
</a>
