<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONSIA Multiempresa</title>
  <style>
    body{margin:0;background:#071018;color:#eef4ff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif}
    .wrap{max-width:1280px;margin:0 auto;padding:18px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
    .title{font-size:34px;font-weight:800}
    button{border:none;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,#38d9ff,#7b61ff);color:#07111a}
    .card{background:#0d1824;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:16px;box-shadow:0 24px 80px rgba(0,0,0,.28)}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:10px;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title">CONSIA Multiempresa</div>
      <button onclick="loadMulti()">Actualizar</button>
    </div>

    <div class="card">
      <table id="multiTable">
        <thead>
          <tr>
            <th>Empresa</th>
            <th>Leads</th>
            <th>Inventario</th>
            <th>Inversión</th>
            <th>Alquiler</th>
            <th>Venta</th>
            <th>Construcción</th>
            <th>Score promedio</th>
            <th>Budget total</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const API = "https://api.consia.world";

    async function loadMulti() {
      const r = await fetch(API + "/v1/multiempresa/summary");
      const d = await r.json();

      const tbody = document.querySelector("#multiTable tbody");
      tbody.innerHTML = "";

      (d.companies || []).forEach((row) => {
        tbody.innerHTML += `
          <tr>
            <td>${row.company || ""}</td>
            <td>${row.leads || 0}</td>
            <td>${row.inventory || 0}</td>
            <td>${row.inversion || 0}</td>
            <td>${row.alquiler || 0}</td>
            <td>${row.venta || 0}</td>
            <td>${row.construccion || 0}</td>
            <td>${row.avg_score || 0}</td>
            <td>${row.total_budget || 0}</td>
          </tr>
        `;
      });
    }

    loadMulti();
  </script>
</body>
</html>
