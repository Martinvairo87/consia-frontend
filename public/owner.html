<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONSIA Owner Console</title>
  <style>
    :root{
      --bg:#05070c;
      --bg2:#0a1020;
      --panel:#0e1730;
      --panel2:#101b38;
      --line:#22345f;
      --text:#f4f7ff;
      --muted:#aab6d3;
      --accent:#4d7cff;
      --accent2:#7ee7ff;
      --ok:#19c37d;
      --danger:#d14a36;
      --shadow:0 24px 60px rgba(0,0,0,.35);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;
      background:
        radial-gradient(circle at top right, rgba(79,124,255,.18), transparent 24%),
        radial-gradient(circle at top left, rgba(126,231,255,.10), transparent 20%),
        linear-gradient(180deg,#04070e,#050912 45%, #04070d 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }
    .wrap{max-width:1380px;margin:0 auto;padding:22px}
    .topbar{
      display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;
      padding:8px 0 26px;border-bottom:1px solid rgba(255,255,255,.06);
    }
    .brand{text-align:center;flex:1 1 auto}
    .brand h1{margin:0;font-size:34px;letter-spacing:.34em;font-weight:700}
    .actions{display:flex;gap:12px;align-items:center}
    .lang{
      background:rgba(255,255,255,.04);color:var(--text);border:1px solid var(--line);
      border-radius:14px;padding:12px 14px;
    }
    .layout{
      display:grid;grid-template-columns:290px 1fr;gap:24px;margin-top:24px;
    }
    .sidebar,.panel{
      background:linear-gradient(180deg,rgba(11,18,40,.94),rgba(8,14,30,.9));
      border:1px solid rgba(126,231,255,.12);
      border-radius:30px;box-shadow:var(--shadow);
    }
    .sidebar{padding:24px}
    .side-title{
      color:var(--muted);font-size:13px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:16px;
    }
    .nav{display:grid;gap:12px}
    .nav a{
      text-decoration:none;color:var(--text);
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
      padding:18px 18px;border-radius:18px;font-size:17px;
    }
    .main{display:grid;gap:22px}
    .hero{
      padding:28px 28px 10px;
    }
    .hero h2{margin:0 0 18px;font-size:58px;line-height:1.04}
    .cards{
      display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px;
    }
    .panel{padding:28px}
    .panel h3{margin:0 0 18px;font-size:22px}
    .big{
      font-size:64px;line-height:1;font-weight:300;color:#a9c4ff;margin:10px 0 24px;
    }
    .pill{
      display:inline-flex;align-items:center;gap:10px;padding:10px 16px;border-radius:999px;
      border:1px solid rgba(255,255,255,.08);font-size:15px;margin-right:10px;
    }
    .pill.ok{background:rgba(25,195,125,.14);color:#b6ffd9}
    .pill.danger{background:rgba(209,74,54,.18);color:#ffd0c8}
    .controls{
      display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;
    }
    .btn{
      border:none;border-radius:18px;padding:16px 22px;cursor:pointer;font-size:17px;
      color:var(--text);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);
    }
    .btn.primary{background:linear-gradient(135deg,var(--accent),#6b92ff);border:none}
    .btn.danger{background:linear-gradient(135deg,#bb3828,#d14a36);border:none}
    .input,.select{
      width:100%;padding:16px 18px;border-radius:16px;border:1px solid rgba(255,255,255,.06);
      background:#091127;color:var(--text);font-size:16px;outline:none;
    }
    .small{color:var(--muted);font-size:15px;margin-top:8px}
    .toolbar{
      display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;
    }
    .mini{
      display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px;
    }
    .log{
      min-height:190px;border:1px solid rgba(255,255,255,.06);border-radius:18px;
      background:#091127;padding:18px;white-space:pre-wrap;font-size:15px;line-height:1.6;
    }
    @media (max-width:1100px){
      .layout{grid-template-columns:1fr}
      .cards,.mini{grid-template-columns:1fr}
      .hero h2{font-size:42px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div style="width:120px"></div>
      <div class="brand">
        <h1>CONSIA</h1>
      </div>
      <div class="actions">
        <select id="langSelector" class="lang" aria-label="Idioma">
          <option value="es">Español</option>
          <option value="en">English</option>
          <option value="pt">Português</option>
        </select>
      </div>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <div class="side-title" data-i18n="modules">Módulos</div>
        <nav class="nav">
          <a href="/command-center.html" data-i18n="commandCenter">Command Center</a>
          <a href="/dashboard.html" data-i18n="dashboard">Dashboard</a>
          <a href="/os.html" data-i18n="consiaOS">CONSIA OS</a>
          <a href="/apps.html" data-i18n="appStore">App Store</a>
          <a href="/marketplace.html" data-i18n="marketplace">Marketplace</a>
          <a href="/agents.html" data-i18n="agentNetwork">Agent Network</a>
          <a href="/automation.html" data-i18n="automationEngine">Automation Engine</a>
        </nav>
      </aside>

      <main class="main">
        <section class="hero panel">
          <h2 data-i18n="ownerConsole">CONSIA OWNER CONSOLE</h2>
        </section>

        <section class="cards">
          <div class="panel">
            <h3 data-i18n="ownerStatus">Owner Status</h3>
            <div class="big" data-i18n="owner">OWNER</div>
            <span class="pill ok" data-i18n="ownerOnlyActive">Owner-Only Active</span>
            <button class="btn primary" type="button" data-i18n="validateOwner">Validate Owner</button>
          </div>

          <div class="panel">
            <h3 data-i18n="globalPricingEngine">Global Pricing Engine</h3>
            <div class="big" id="priceValue">1.45x</div>
            <input class="input" id="priceInput" value="1.60" />
            <div class="small" data-i18n="example160">Ej: 1.60</div>
            <div class="controls">
              <button class="btn primary" id="priceBtn" data-i18n="updatePricing">Update Pricing</button>
            </div>
          </div>

          <div class="panel">
            <h3 data-i18n="revenueShare">Revenue Share</h3>
            <div class="big" id="shareValue">15%</div>
            <input class="input" id="shareInput" value="20" />
            <div class="small" data-i18n="example20">Ej: 20
