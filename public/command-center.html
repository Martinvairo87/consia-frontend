<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA GLOBAL COMMAND CENTER</title>

<style>

body{
background:#050f22;
color:white;
font-family:Arial,Helvetica,sans-serif;
margin:0;
overflow:hidden;
}

.topbar{
height:60px;
background:#071a38;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.title{
font-size:20px;
font-weight:700;
letter-spacing:1px;
}

.system-status{
color:#49ffb3;
font-weight:600;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.sidebar{
width:230px;
background:#071428;
padding:20px;
box-sizing:border-box;
border-right:1px solid rgba(255,255,255,0.05);
}

.menu button{
width:100%;
padding:12px;
margin-bottom:10px;
background:#0b2045;
border:0;
color:white;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.menu button:hover{
background:#173b77;
}

.main{
flex:1;
padding:25px;
overflow:auto;
}

.cards{
display:flex;
gap:20px;
margin-bottom:25px;
}

.card{
flex:1;
background:#0b1d3d;
padding:20px;
border-radius:8px;
}

.card-title{
font-size:16px;
opacity:.8;
}

.card-value{
font-size:18px;
font-weight:700;
margin-top:4px;
}

.panel{
background:#071a36;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

.section-title{
font-size:18px;
margin-bottom:15px;
}

.agent{
background:#0b2b5a;
padding:10px;
margin-bottom:8px;
border-radius:6px;
font-size:13px;
}

.brain-input{
width:100%;
padding:12px;
background:#0b2147;
border:0;
color:white;
border-radius:6px;
margin-bottom:10px;
}

.run-button{
padding:10px 18px;
background:#1f66ff;
border:0;
color:white;
border-radius:6px;
cursor:pointer;
}

.output{
margin-top:15px;
background:#020a16;
padding:15px;
border-radius:6px;
font-size:13px;
white-space:pre-wrap;
}

.status{
font-size:12px;
opacity:.7;
margin-top:8px;
}

</style>

</head>

<body>

<div class="topbar">

<div class="title">
CONSIA GLOBAL COMMAND CENTER
</div>

<div class="system-status">
SYSTEM ONLINE
</div>

</div>

<div class="container">

<div class="sidebar">

<div class="menu">

<button onclick="openPanel('agents')">Agents</button>
<button onclick="openPanel('projects')">Projects</button>
<button onclick="openPanel('memory')">Memory</button>
<button onclick="openPanel('strategic')">Strategic</button>
<button onclick="openPanel('learning')">Learning</button>
<button onclick="openPanel('system')">System</button>

</div>

</div>

<div class="main">

<div class="cards">

<div class="card">
<div class="card-title">CORE</div>
<div class="card-value" id="core-status">ACTIVE</div>
</div>

<div class="card">
<div class="card-title">API</div>
<div class="card-value" id="api-status">CONNECTING...</div>
</div>

<div class="card">
<div class="card-title">AGENTS</div>
<div class="card-value" id="agents-count">LOADING...</div>
</div>

<div class="card">
<div class="card-title">LEARNING</div>
<div class="card-value" id="learning-status">ACTIVE</div>
</div>

</div>

<div class="panel">

<div class="section-title">
CONSIA GLOBAL BRAIN
</div>

<input
id="brain-input"
class="brain-input"
placeholder="Ask CONSIA or execute command"
/>

<button
class="run-button"
onclick="runBrain()"
>
RUN
</button>

<div
class="output"
id="brain-output"
>
Waiting command...
</div>

</div>

<div class="panel">

<div class="section-title">
ACTIVE AGENTS
</div>

<div id="agents-list">
Loading agents...
</div>

</div>

</div>

</div>

<script>

function openPanel(name){
console.log("open panel:",name)
}

async function checkAPI(){

try{

const res=await fetch("https://api.consia.world/")
await res.json()

document.getElementById("api-status").innerText="CONNECTED"

}catch(e){

document.getElementById("api-status").innerText="OFFLINE"

}

}

checkAPI()

async function loadAgents(){

try{

const res=await fetch("https://api.consia.world/v1/agents")
const data=await res.json()

const box=document.getElementById("agents-list")

if(!data.agents){

box.innerHTML="No agents"
return

}

document.getElementById("agents-count").innerText=data.agents.length+" ONLINE"

box.innerHTML=data.agents
.map(a=>`<div class="agent">${a.name}</div>`)
.join("")

}catch(e){

document.getElementById("agents-list").innerText="Agents loading fallback"

}

}

loadAgents()

async function runBrain(){

const input=document.getElementById("brain-input").value

if(!input) return

document.getElementById("brain-output").innerText="CONSIA thinking..."

if(window.runBrainAndDispatch){

const result=await window.runBrainAndDispatch(input)

document.getElementById("brain-output").innerText=
JSON.stringify(result,null,2)

}else{

document.getElementById("brain-output").innerText=
"Global Brain not loaded"

}

}

</script>

<script src="/agents-autopilot-final.js"></script>
<script src="/global-brain.js"></script>
<script src="/strategic-engine.js"></script>
<script src="/self-learning-engine.js"></script>

</body>
</html>
