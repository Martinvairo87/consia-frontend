<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CONSIA GLOBAL COMMAND CENTER</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
background:#0f172a;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:20px;
font-weight:700;
letter-spacing:2px;
}

.status{
display:flex;
gap:12px;
align-items:center;
}

.badge{
padding:6px 10px;
border-radius:8px;
font-size:12px;
background:#0ea5e9;
}

.layout{
display:grid;
grid-template-columns:220px 1fr 280px;
height:calc(100vh - 60px);
}

.sidebar{
background:#020617;
border-right:1px solid #1e293b;
padding:20px;
}

.sidebar button{
width:100%;
background:#0f172a;
border:none;
color:white;
padding:12px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
}

.main{
padding:20px;
overflow:auto;
}

.card{
background:#0f172a;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:14px;
}

.metric{
background:#020617;
padding:16px;
border-radius:10px;
text-align:center;
}

.metric h3{
margin:0;
font-size:28px;
}

.console{
width:100%;
padding:14px;
border-radius:8px;
border:none;
background:#020617;
color:white;
margin-top:10px;
}

.right{
border-left:1px solid #1e293b;
padding:20px;
}

.avatar{
background:#020617;
border-radius:50%;
height:120px;
width:120px;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-top:8px;
background:#0ea5e9;
color:white;
cursor:pointer;
}

.agent{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #1e293b;
}

</style>
</head>

<body>

<header>
<div class="logo">CONSIA</div>

<div class="status">
<div class="badge">CORE ONLINE</div>
<div class="badge">AGENTS ACTIVE</div>
<div class="badge" id="clock"></div>
</div>

</header>

<div class="layout">

<div class="sidebar">

<button onclick="section('system')">System</button>
<button onclick="section('agents')">Agent Swarm</button>
<button onclick="section('projects')">Projects</button>
<button onclick="section('memory')">Memory</button>
<button onclick="section('autopilot')">Autopilot</button>
<button onclick="section('economy')">Economy</button>
<button onclick="section('owner')">Owner</button>

</div>

<div class="main" id="main">

<div class="card">
<h2>SYSTEM STATUS</h2>

<div class="grid">

<div class="metric"><p>Agents</p><h3 id="agents">10</h3></div>
<div class="metric"><p>Memory</p><h3 id="memory">3</h3></div>
<div class="metric"><p>Projects</p><h3 id="projects">5</h3></div>
<div class="metric"><p>Marketplace</p><h3 id="market">8</h3></div>

</div>
</div>

<div class="card">

<h2>COMMAND CONSOLE</h2>

<input class="console" id="cmd" placeholder="Ej: crear proyecto inmobiliario en Posadas">

<button class="button" onclick="runCommand()">Ejecutar</button>

</div>

</div>

<div class="right">

<div class="card">

<div class="avatar">CONSIA</div>

<button class="button" onclick="listen()">Escuchar</button>
<button class="button" onclick="speak()">Hablar</button>
<button class="button" onclick="stopVoice()">Detener</button>

</div>

<div class="card">

<h3>AGENT SWARM</h3>

<div class="agent"><span>research</span><span>ready</span></div>
<div class="agent"><span>analysis</span><span>ready</span></div>
<div class="agent"><span>execution</span><span>ready</span></div>
<div class="agent"><span>strategy</span><span>ready</span></div>
<div class="agent"><span>business</span><span>ready</span></div>
<div class="agent"><span>marketing</span><span>ready</span></div>
<div class="agent"><span>automation</span><span>ready</span></div>
<div class="agent"><span>finance</span><span>ready</span></div>
<div class="agent"><span>legal</span><span>ready</span></div>
<div class="agent"><span>memory</span><span>ready</span></div>

</div>

</div>

</div>

<script>

function section(name){
alert("Opening "+name)
}

function runCommand(){

const cmd=document.getElementById("cmd").value

fetch("https://api.consia.world/v1/chat",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({message:cmd})
})
.then(r=>r.json())
.then(d=>alert(JSON.stringify(d)))

}

function listen(){

const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()
recognition.lang="es"
recognition.start()

recognition.onresult=function(e){

document.getElementById("cmd").value=e.results[0][0].transcript

}

}

function speak(){

const text=document.getElementById("cmd").value
const utter=new SpeechSynthesisUtterance(text)
speechSynthesis.speak(utter)

}

function stopVoice(){

speechSynthesis.cancel()

}

setInterval(()=>{

const now=new Date()
document.getElementById("clock").innerText=now.toLocaleTimeString()

},1000)

</script>

</body>
</html>
