<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA GLOBAL COMMAND CENTER</title>

<style>

body{
background:#060f1f;
color:white;
font-family:Arial,Helvetica,sans-serif;
margin:0;
overflow:hidden;
}

.topbar{
height:60px;
background:#081a36;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.title{
font-size:20px;
font-weight:700;
letter-spacing:1px;
}

.system-status{
color:#4cffb0;
font-weight:600;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.sidebar{
width:220px;
background:#08152b;
padding:20px;
box-sizing:border-box;
border-right:1px solid rgba(255,255,255,0.05);
}

.menu{
margin-top:10px;
}

.menu button{
width:100%;
padding:12px;
margin-bottom:10px;
background:#0c1e3f;
border:0;
color:white;
border-radius:6px;
cursor:pointer;
}

.menu button:hover{
background:#12326b;
}

.main{
flex:1;
padding:25px;
overflow:auto;
}

.cards{
display:flex;
gap:20px;
margin-bottom:25px;
}

.card{
flex:1;
background:#0b1c3a;
padding:20px;
border-radius:8px;
}

.card-title{
font-size:18px;
margin-bottom:5px;
}

.card-value{
font-size:14px;
opacity:.8;
}

.panel{
background:#081933;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

.section-title{
font-size:18px;
margin-bottom:15px;
}

.agent{
background:#0c254d;
padding:10px;
margin-bottom:8px;
border-radius:6px;
}

.brain-input{
width:100%;
padding:12px;
background:#0b2044;
border:0;
color:white;
border-radius:6px;
margin-bottom:10px;
}

.brain-button{
padding:10px 16px;
background:#1f5eff;
border:0;
border-radius:6px;
color:white;
cursor:pointer;
}

.output{
margin-top:15px;
font-size:13px;
background:#041020;
padding:15px;
border-radius:6px;
white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="topbar">

<div class="title">
CONSIA GLOBAL COMMAND CENTER
</div>

<div class="system-status">
SYSTEM ONLINE
</div>

</div>

<div class="container">

<div class="sidebar">

<div class="menu">

<button onclick="showSection('agents')">Agents</button>
<button onclick="showSection('projects')">Projects</button>
<button onclick="showSection('memory')">Memory</button>
<button onclick="showSection('system')">System</button>

</div>

</div>

<div class="main">

<div class="cards">

<div class="card">
<div class="card-title">CORE</div>
<div class="card-value" id="core-status">ACTIVE</div>
</div>

<div class="card">
<div class="card-title">API</div>
<div class="card-value" id="api-status">CONNECTING...</div>
</div>

<div class="card">
<div class="card-title">AGENTS</div>
<div class="card-value" id="agents-count">loading...</div>
</div>

</div>

<div class="panel">

<div class="section-title">
CONSIA GLOBAL BRAIN
</div>

<input
id="brain-input"
class="brain-input"
placeholder="Ask CONSIA or execute a command"
/>

<button
class="brain-button"
id="brain-run"
>
RUN
</button>

<div
class="output"
id="brain-output"
>
Waiting command...
</div>

</div>

<div class="panel">

<div class="section-title">
ACTIVE AGENTS
</div>

<div id="agents-list">
loading agents...
</div>

</div>

</div>

</div>

<script>

function showSection(name){
console.log("open section:",name)
}

async function checkAPI(){

try{

const res=await fetch("https://api.consia.world/")
const data=await res.json()

document.getElementById("api-status").innerText="CONNECTED"

}catch(e){

document.getElementById("api-status").innerText="OFFLINE"

}

}

checkAPI()

async function loadAgents(){

try{

const res=await fetch("https://api.consia.world/v1/agents")
const data=await res.json()

const box=document.getElementById("agents-list")

if(!data.agents){
box.innerHTML="No agents found"
return
}

document.getElementById("agents-count").innerText=data.agents.length+" ONLINE"

box.innerHTML=data.agents
.map(a=>`<div class="agent">${a.name}</div>`)
.join("")

}catch(e){

document.getElementById("agents-list").innerText="Agents loading fallback"

}

}

loadAgents()

</script>

<script src="/agents-autopilot-final.js"></script>
<script src="/global-brain.js"></script>

</body>
</html>
