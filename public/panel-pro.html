<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSIA OWNER</title>

<style>
body {
  margin:0;
  background: radial-gradient(circle at center, #05070d, #000);
  overflow:hidden;
  font-family: -apple-system, BlinkMacSystemFont;
  color:white;
}

#avatar {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:280px;
  height:280px;
  border-radius:50%;
  background: radial-gradient(circle, #4fc3ff, #7b61ff);
  box-shadow:0 0 120px rgba(79,195,255,0.6);
  animation: pulse 3s infinite;
}

@keyframes pulse {
  0% { transform:translate(-50%,-50%) scale(1); }
  50% { transform:translate(-50%,-50%) scale(1.08); }
  100% { transform:translate(-50%,-50%) scale(1); }
}

#text {
  position:absolute;
  bottom:80px;
  width:100%;
  text-align:center;
  font-size:22px;
  opacity:0.8;
}

.panel {
  position:absolute;
  top:20px;
  left:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:20px;
  border-radius:16px;
}

button {
  background:linear-gradient(90deg,#4fc3ff,#7b61ff);
  border:none;
  padding:12px 20px;
  border-radius:10px;
  color:white;
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="avatar"></div>

<div id="text">CONSIA conectado…</div>

<div class="panel">
  <button onclick="load()">Actualizar sistema</button>
</div>

<script>
const API = "https://api.consia.world";

async function load(){
  const token = localStorage.getItem("token");

  const res = await fetch(API+"/v1/platform/global/summary",{
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();

  document.getElementById("text").innerText =
    "Tenants: "+data.summary.tenants+
    " | Users: "+data.summary.users;
}

// auto login si ya hay token
if(localStorage.getItem("token")){
  load();
}
</script>

</body>
</html>
