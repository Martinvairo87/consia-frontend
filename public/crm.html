<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONSIA CRM PRO</title>
  <meta name="theme-color" content="#05070a" />
  <style>
    :root{
      --bg:#05070a;
      --bg2:#0a0f16;
      --panel:#0f1722;
      --panel2:#131d2b;
      --line:#223247;
      --line2:#2b405c;
      --text:#eef4ff;
      --muted:#91a5c0;
      --blue:#3b82f6;
      --blue2:#1d4ed8;
      --cyan:#06b6d4;
      --green:#22c55e;
      --green2:#15803d;
      --yellow:#f59e0b;
      --orange:#ea580c;
      --red:#ef4444;
      --red2:#b91c1c;
      --violet:#8b5cf6;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:20px;
      --radius-sm:14px;
      --glass:rgba(15,23,34,.78);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif}
    body{min-height:100vh}
    button,input,select,textarea{font:inherit}
    a{color:inherit;text-decoration:none}

    .wrap{max-width:1700px;margin:0 auto;padding:18px}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:16px;
      border:1px solid var(--line);background:var(--glass);backdrop-filter:blur(10px);
      border-radius:24px;padding:16px 18px;box-shadow:var(--shadow);margin-bottom:18px
    }
    .brand{display:flex;align-items:center;gap:14px}
    .logo{
      width:48px;height:48px;border-radius:16px;display:grid;place-items:center;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), transparent 34%),
        linear-gradient(180deg,#0b1220,#0f172a);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 14px 28px rgba(37,99,235,.16), inset 0 0 0 1px rgba(255,255,255,.04);
      font-size:22px;font-weight:900;letter-spacing:.5px
    }
    .brand h1{margin:0;font-size:20px;font-weight:900;letter-spacing:.4px}
    .brand p{margin:3px 0 0;color:var(--muted);font-size:12px}

    .top-actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      height:42px;padding:0 14px;border-radius:12px;border:1px solid var(--line2);
      background:#0f1826;color:var(--text);cursor:pointer;font-weight:700;
      transition:.18s ease;display:inline-flex;align-items:center;justify-content:center;gap:8px;
      box-shadow:0 8px 20px rgba(0,0,0,.18)
    }
    .btn:hover{transform:translateY(-1px);border-color:#3a5475}
    .btn.primary{background:linear-gradient(180deg,var(--blue),var(--blue2));border-color:transparent}
    .btn.green{background:linear-gradient(180deg,var(--green),var(--green2));border-color:transparent}
    .btn.yellow{background:linear-gradient(180deg,var(--yellow),var(--orange));border-color:transparent}
    .btn.red{background:linear-gradient(180deg,var(--red),var(--red2));border-color:transparent}
    .btn.ghost{background:transparent}
    .btn.sm{height:36px;padding:0 12px;font-size:13px}

    .stats{
      display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-bottom:18px
    }
    .stat{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border:1px solid var(--line);border-radius:20px;padding:14px 16px;box-shadow:var(--shadow)
    }
    .stat .label{font-size:12px;color:var(--muted);margin-bottom:8px}
    .stat .value{font-size:28px;font-weight:900;letter-spacing:.2px}
    .stat .sub{font-size:11px;color:var(--muted);margin-top:6px}

    .filters{
      display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr 1fr auto;gap:12px;margin-bottom:18px;align-items:end
    }
    .field{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border:1px solid var(--line);border-radius:18px;padding:12px 14px;box-shadow:var(--shadow)
    }
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:8px}
    .field input,.field select,.field textarea{
      width:100%;border:1px solid #21324a;background:#0b1220;color:var(--text);
      border-radius:12px;padding:12px;outline:none
    }
    .field textarea{resize:vertical;min-height:110px}

    .board{
      display:grid;grid-template-columns:repeat(6,minmax(280px,1fr));gap:14px;align-items:start
    }
    .column{
      min-height:520px;background:linear-gradient(180deg,var(--panel),var(--panel2));
      border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden
    }
    .column-head{
      padding:14px;border-bottom:1px solid var(--line);background:rgba(15,23,34,.9);backdrop-filter:blur(8px)
    }
    .column-title{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .column-title h3{margin:0;font-size:15px}
    .count{
      min-width:28px;height:28px;padding:0 8px;border-radius:999px;
      display:grid;place-items:center;font-weight:900;font-size:12px;
      background:#0b1220;border:1px solid var(--line2)
    }
    .column-sub{margin-top:6px;font-size:11px;color:var(--muted)}
    .list{padding:12px;display:flex;flex-direction:column;gap:10px}
    .empty{
      padding:18px;border:1px dashed #30445f;border-radius:16px;text-align:center;
      color:var(--muted);font-size:13px;margin-top:10px
    }

    .card{
      position:relative;background:#0b1220;border:1px solid #1d2d45;border-radius:18px;
      padding:14px;cursor:pointer;transition:.18s ease;overflow:hidden
    }
    .card:hover{transform:translateY(-1px);border-color:#3d5c84;box-shadow:0 16px 26px rgba(0,0,0,.2)}
    .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:#3b82f6}
    .card.high::before{background:var(--red)}
    .card.medium::before{background:var(--yellow)}
    .card.low::before{background:var(--green)}

    .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .name{font-size:15px;font-weight:900}
    .pill{
      display:inline-flex;align-items:center;justify-content:center;
      border-radius:999px;padding:6px 10px;font-size:11px;font-weight:900;text-transform:uppercase;
      border:1px solid transparent;letter-spacing:.3px
    }
    .pill.high{background:#251012;color:#ffc7cb;border-color:#5c1e25}
    .pill.medium{background:#241a08;color:#ffe4a8;border-color:#6e4c0c}
    .pill.low{background:#0f1d13;color:#b7f7cc;border-color:#1b5e31}
    .pill.intent{background:#101a28;color:#d8e7ff;border-color:#233754}

    .meta{
      margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;color:var(--muted)
    }
    .meta div{
      background:#0f1826;border:1px solid #18283d;padding:8px 10px;border-radius:10px;min-height:42px
    }

    .msg{
      margin-top:10px;font-size:12px;line-height:1.45;color:#d1ddf1;background:#0d1521;border:1px solid #17263a;
      padding:10px;border-radius:12px;max-height:104px;overflow:auto
    }

    .scorebar{
      margin-top:10px;background:#0c1320;border:1px solid #1a2940;border-radius:999px;height:10px;overflow:hidden
    }
    .scorebar > span{
      display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));
      width:0%
    }

    .footer{
      margin-top:10px;display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:11px
    }

    .modal-bg{
      position:fixed;inset:0;background:rgba(0,0,0,.58);display:none;align-items:center;justify-content:center;
      z-index:100;padding:18px
    }
    .modal{
      width:min(980px,100%);max-height:92vh;overflow:auto;
      background:linear-gradient(180deg,#0d1521,#0b1220);border:1px solid #22324a;border-radius:24px;
      box-shadow:0 30px 80px rgba(0,0,0,.5);padding:18px
    }
    .modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    .modal-title{font-size:24px;font-weight:900}
    .modal-sub{font-size:12px;color:var(--muted);margin-top:4px}
    .close{
      width:40px;height:40px;border-radius:12px;border:1px solid var(--line2);background:#101a29;
      color:var(--text);display:grid;place-items:center;cursor:pointer;font-size:20px
    }
    .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .span-2{grid-column:1 / -1}
    .notes-list{display:flex;flex-direction:column;gap:8px}
    .note{
      background:#0b1320;border:1px solid #1b2b42;border-radius:12px;padding:10px 12px;font-size:13px;color:#d8e4f7
    }
    .note small{display:block;color:var(--muted);margin-top:6px}

    .toast{
      position:fixed;right:18px;bottom:18px;background:#0f1826;border:1px solid #29415f;
      border-radius:14px;padding:12px 14px;color:var(--text);box-shadow:var(--shadow);display:none;z-index:120
    }

    .loading{
      position:fixed;left:50%;transform:translateX(-50%);bottom:18px;background:#0d1624;border:1px solid #2b405e;
      border-radius:14px;padding:10px 14px;box-shadow:var(--shadow);display:none;z-index:120;font-size:13px
    }

    @media (max-width: 1450px){
      .stats{grid-template-columns:repeat(4,1fr)}
      .filters{grid-template-columns:1fr 1fr 1fr}
      .board{grid-template-columns:repeat(3,minmax(280px,1fr))}
    }
    @media (max-width: 900px){
      .stats{grid-template-columns:repeat(2,1fr)}
      .filters{grid-template-columns:1fr}
      .board{grid-template-columns:1fr}
      .modal-grid{grid-template-columns:1fr}
      .span-2{grid-column:auto}
      .topbar{flex-direction:column;align-items:stretch}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo">C</div>
        <div>
          <h1>CONSIA CRM PRO</h1>
          <p>Pipeline comercial inmobiliario · scoring · seguimiento · control total</p>
        </div>
      </div>

      <div class="top-actions">
        <button class="btn" onclick="loadAll()">Actualizar</button>
        <button class="btn green" onclick="runFollowups()">Seguimiento PRO</button>
        <button class="btn yellow" onclick="runCleanup()">Limpiar CRM</button>
        <button class="btn primary" onclick="openCreateModal()">Nuevo lead</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="label">Leads totales</div><div class="value" id="stat-total">0</div><div class="sub">Base activa</div></div>
      <div class="stat"><div class="label">Alta prioridad</div><div class="value" id="stat-high">0</div><div class="sub">Leads calientes</div></div>
      <div class="stat"><div class="label">Compra</div><div class="value" id="stat-compra">0</div><div class="sub">Demanda real</div></div>
      <div class="stat"><div class="label">Alquiler</div><div class="value" id="stat-alquiler">0</div><div class="sub">Locación</div></div>
      <div class="stat"><div class="label">Inversión</div><div class="value" id="stat-inversion">0</div><div class="sub">Capital listo</div></div>
      <div class="stat"><div class="label">Venta</div><div class="value" id="stat-venta">0</div><div class="sub">Propietarios</div></div>
      <div class="stat"><div class="label">Status API</div><div class="value" id="stat-mode">—</div><div class="sub" id="stat-version">—</div></div>
    </div>

    <div class="filters">
      <div class="field">
        <label>Buscar</label>
        <input id="search" type="text" placeholder="Nombre, teléfono, email, zona, necesidad..." oninput="renderBoard()" />
      </div>
      <div class="field">
        <label>Prioridad</label>
        <select id="filter-priority" onchange="renderBoard()">
          <option value="">Todas</option>
          <option value="alta">Alta</option>
          <option value="media">Media</option>
          <option value="baja">Baja</option>
        </select>
      </div>
      <div class="field">
        <label>Intención</label>
        <select id="filter-intent" onchange="renderBoard()">
          <option value="">Todas</option>
          <option value="compra">Compra</option>
          <option value="alquiler">Alquiler</option>
          <option value="inversion">Inversión</option>
          <option value="venta">Venta</option>
          <option value="general">General</option>
        </select>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="filter-status" onchange="renderBoard()">
          <option value="">Todos</option>
          <option value="new">new</option>
          <option value="contactado">contactado</option>
          <option value="seguimiento">seguimiento</option>
          <option value="cerrado">cerrado</option>
        </select>
      </div>
      <div class="field">
        <label>Etapa</label>
        <select id="filter-stage" onchange="renderBoard()">
          <option value="">Todas</option>
          <option value="captado">captado</option>
          <option value="calificado">calificado</option>
          <option value="visita">visita</option>
          <option value="propuesta">propuesta</option>
          <option value="negociacion">negociacion</option>
          <option value="cierre">cierre</option>
        </select>
      </div>
      <button class="btn ghost" onclick="clearFilters()">Limpiar filtros</button>
    </div>

    <div class="board" id="board"></div>
  </div>

  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <div class="modal-head">
        <div>
          <div class="modal-title" id="modal-title">Lead</div>
          <div class="modal-sub" id="modal-sub">Detalle comercial</div>
        </div>
        <button class="close" onclick="closeModal()">×</button>
      </div>

      <div class="modal-grid">
        <div class="field">
          <label>Nombre</label>
          <input id="m-name" type="text" />
        </div>
        <div class="field">
          <label>Teléfono</label>
          <input id="m-phone" type="text" />
        </div>
        <div class="field">
          <label>Email</label>
          <input id="m-email" type="text" />
        </div>
        <div class="field">
          <label>Zona</label>
          <input id="m-zone" type="text" />
        </div>
        <div class="field">
          <label>Presupuesto</label>
          <input id="m-budget" type="text" />
        </div>
        <div class="field">
          <label>Dormitorios</label>
          <input id="m-bedrooms" type="text" />
        </div>
        <div class="field">
          <label>Tipo de propiedad</label>
          <input id="m-property" type="text" />
        </div>
        <div class="field">
          <label>Intención</label>
          <select id="m-intent">
            <option value="general">general</option>
            <option value="compra">compra</option>
            <option value="alquiler">alquiler</option>
            <option value="inversion">inversion</option>
            <option value="venta">venta</option>
          </select>
        </div>
        <div class="field">
          <label>Stage</label>
          <select id="m-stage">
            <option value="captado">captado</option>
            <option value="calificado">calificado</option>
            <option value="visita">visita</option>
            <option value="propuesta">propuesta</option>
            <option value="negociacion">negociacion</option>
            <option value="cierre">cierre</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="m-status">
            <option value="new">new</option>
            <option value="contactado">contactado</option>
            <option value="seguimiento">seguimiento</option>
            <option value="cerrado">cerrado</option>
          </select>
        </div>
        <div class="field">
          <label>Prioridad</label>
          <select id="m-priority">
            <option value="alta">alta</option>
            <option value="media">media</option>
            <option value="baja">baja</option>
          </select>
        </div>
        <div class="field">
          <label>Origen</label>
          <input id="m-source" type="text" disabled />
        </div>

        <div class="field span-2">
          <label>Necesidad / resumen</label>
          <textarea id="m-need"></textarea>
        </div>

        <div class="field">
          <label>Score</label>
          <input id="m-score" type="text" disabled />
        </div>
        <div class="field">
          <label>Próximo seguimiento</label>
          <input id="m-follow" type="text" disabled />
        </div>

        <div class="field span-2">
          <label>Agregar nota comercial</label>
          <textarea id="m-note" placeholder="Ej: cliente con interés concreto, coordinar visita, enviar opciones, avanzar con propuesta..."></textarea>
        </div>

        <div class="field span-2">
          <label>Historial</label>
          <div class="notes-list" id="m-notes"></div>
        </div>

        <div class="span-2" style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn green" id="btn-save" onclick="saveLead()">Guardar cambios</button>
          <button class="btn primary" onclick="quickStage('visita')">Mover a visita</button>
          <button class="btn primary" onclick="quickStage('propuesta')">Mover a propuesta</button>
          <button class="btn yellow" onclick="quickStage('negociacion')">Mover a negociación</button>
          <button class="btn red" onclick="quickStage('cierre')">Mover a cierre</button>
          <button class="btn ghost" id="btn-delete" onclick="deleteLead()">Eliminar lead</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="loading" id="loading">Procesando...</div>

  <script>
    const API = "https://consia-api.jbdkb7r94d.workers.dev";
    const STAGES = [
      { key:"captado", label:"Captado", sub:"Lead nuevo / entrante" },
      { key:"calificado", label:"Calificado", sub:"Filtrado y con potencial real" },
      { key:"visita", label:"Visita", sub:"Visita coordinada o próxima" },
      { key:"propuesta", label:"Propuesta", sub:"Oferta enviada" },
      { key:"negociacion", label:"Negociación", sub:"Condiciones y cierre" },
      { key:"cierre", label:"Cierre", sub:"Operación concretada" }
    ];

    let pipeline = {};
    let leads = [];
    let selectedLead = null;
    let modalMode = "edit";

    function qs(id){ return document.getElementById(id); }

    function toast(msg){
      const el = qs("toast");
      el.textContent = msg;
      el.style.display = "block";
      clearTimeout(window.__toastT);
      window.__toastT = setTimeout(() => el.style.display = "none", 2500);
    }

    function setLoading(v){
      qs("loading").style.display = v ? "block" : "none";
    }

    function escapeHtml(v){
      return String(v ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function normPriority(v){
      const p = String(v || "").toLowerCase();
      if (p === "high") return "alta";
      if (p === "medium" || p === "normal") return "media";
      if (p === "low") return "baja";
      return p || "baja";
    }

    function priorityClass(v){
      const p = normPriority(v);
      if (p === "alta") return "high";
      if (p === "media") return "medium";
      return "low";
    }

    function stageOf(lead){
      return lead.stage || lead.pipeline_stage || "captado";
    }

    function scorePct(score){
      const s = Number(score || 0);
      return Math.max(4, Math.min(100, s));
    }

    function formatDate(ts){
      if (!ts) return "—";
      try { return new Date(ts).toLocaleString(); } catch { return "—"; }
    }

    async function loadStatus(){
      const res = await fetch(API + "/v1/status");
      const data = await res.json();
      qs("stat-mode").textContent = data.mode || "OK";
      qs("stat-version").textContent = data.version || "—";
    }

    async function loadAll(){
      setLoading(true);
      try{
        await loadStatus();

        const [pRes, lRes] = await Promise.all([
          fetch(API + "/v1/pipeline"),
          fetch(API + "/v1/leads")
        ]);

        const pJson = await pRes.json();
        const lJson = await lRes.json();

        pipeline = pJson.pipeline || {};
        leads = Array.isArray(lJson.leads) ? lJson.leads.filter(Boolean) : [];

        updateStats();
        renderBoard();
      }catch(err){
        toast("Error cargando CRM");
      }finally{
        setLoading(false);
      }
    }

    function updateStats(){
      qs("stat-total").textContent = leads.length;
      qs("stat-high").textContent = leads.filter(l => normPriority(l.priority) === "alta").length;
      qs("stat-compra").textContent = leads.filter(l => l.intent === "compra").length;
      qs("stat-alquiler").textContent = leads.filter(l => l.intent === "alquiler").length;
      qs("stat-inversion").textContent = leads.filter(l => l.intent === "inversion").length;
      qs("stat-venta").textContent = leads.filter(l => l.intent === "venta").length;
    }

    function passesFilters(lead){
      const q = qs("search").value.trim().toLowerCase();
      const fp = qs("filter-priority").value;
      const fi = qs("filter-intent").value;
      const fs = qs("filter-status").value;
      const fst = qs("filter-stage").value;

      const hay = [
        lead.name, lead.phone, lead.email, lead.zone, lead.need,
        lead.intent, lead.property_type, lead.budget, lead.bedrooms
      ].join(" ").toLowerCase();

      if (q && !hay.includes(q)) return false;
      if (fp && normPriority(lead.priority) !== fp) return false;
      if (fi && (lead.intent || "") !== fi) return false;
      if (fs && (lead.status || "") !== fs) return false;
      if (fst && stageOf(lead) !== fst) return false;

      return true;
    }

    function renderBoard(){
      const board = qs("board");
      board.innerHTML = "";

      STAGES.forEach(stage => {
        const col = document.createElement("div");
        col.className = "column";

        const stageLeads = (pipeline[stage.key] || []).filter(Boolean).filter(passesFilters);

        col.innerHTML = `
          <div class="column-head">
            <div class="column-title">
              <h3>${stage.label}</h3>
              <div class="count">${stageLeads.length}</div>
            </div>
            <div class="column-sub">${stage.sub}</div>
          </div>
          <div class="list"></div>
        `;

        const list = col.querySelector(".list");

        if (!stageLeads.length){
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "Sin leads en esta etapa";
          list.appendChild(empty);
        } else {
          stageLeads.forEach(lead => {
            const card = document.createElement("div");
            card.className = `card ${priorityClass(lead.priority)}`;
            card.onclick = () => openEditModal(lead);

            card.innerHTML = `
              <div class="row">
                <div class="name">${escapeHtml(lead.name || "Sin nombre")}</div>
                <div class="pill ${priorityClass(lead.priority)}">${escapeHtml(normPriority(lead.priority))}</div>
              </div>

              <div class="meta">
                <div>📞 ${escapeHtml(lead.phone || "Sin teléfono")}</div>
                <div>📍 ${escapeHtml(lead.zone || "Sin zona")}</div>
                <div>💰 ${escapeHtml(lead.budget || "Sin presupuesto")}</div>
                <div>🏠 ${escapeHtml((lead.property_type || "Sin tipo") + (lead.bedrooms ? " · " + lead.bedrooms + " dorm." : ""))}</div>
              </div>

              <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
                <div class="pill intent">${escapeHtml(lead.intent || "general")}</div>
                <div class="pill intent">${escapeHtml(lead.status || "new")}</div>
                <div class="pill intent">score ${escapeHtml(lead.score || 0)}</div>
              </div>

              <div class="msg">${escapeHtml(lead.need || lead.last_message || "Sin resumen")}</div>

              <div class="scorebar"><span style="width:${scorePct(lead.score)}%"></span></div>

              <div class="footer">
                <span>${escapeHtml(formatDate(lead.updated_at))}</span>
                <span>${escapeHtml(stageOf(lead))}</span>
              </div>
            `;
            list.appendChild(card);
          });
        }

        board.appendChild(col);
      });
    }

    function clearFilters(){
      qs("search").value = "";
      qs("filter-priority").value = "";
      qs("filter-intent").value = "";
      qs("filter-status").value = "";
      qs("filter-stage").value = "";
      renderBoard();
    }

    function closeModal(){
      selectedLead = null;
      qs("modal-bg").style.display = "none";
    }

    function openCreateModal(){
      modalMode = "create";
      selectedLead = null;

      qs("modal-title").textContent = "Nuevo lead";
      qs("modal-sub").textContent = "Carga manual";
      qs("btn-delete").style.display = "none";

      qs("m-name").value = "";
      qs("m-phone").value = "";
      qs("m-email").value = "";
      qs("m-zone").value = "";
      qs("m-budget").value = "";
      qs("m-bedrooms").value = "";
      qs("m-property").value = "";
      qs("m-intent").value = "general";
      qs("m-stage").value = "captado";
      qs("m-status").value = "new";
      qs("m-priority").value = "baja";
      qs("m-source").value = "manual";
      qs("m-need").value = "";
      qs("m-score").value = "0";
      qs("m-follow").value = "—";
      qs("m-note").value = "";
      qs("m-notes").innerHTML = `<div class="note">Lead nuevo sin historial</div>`;

      qs("modal-bg").style.display = "flex";
    }

    function openEditModal(lead){
      modalMode = "edit";
      selectedLead = JSON.parse(JSON.stringify(lead));

      qs("modal-title").textContent = selectedLead.name || "Lead sin nombre";
      qs("modal-sub").textContent = `${selectedLead.intent || "general"} · ${selectedLead.phone || "sin teléfono"}`;
      qs("btn-delete").style.display = "inline-flex";

      qs("m-name").value = selectedLead.name || "";
      qs("m-phone").value = selectedLead.phone || "";
      qs("m-email").value = selectedLead.email || "";
      qs("m-zone").value = selectedLead.zone || "";
      qs("m-budget").value = selectedLead.budget || "";
      qs("m-bedrooms").value = selectedLead.bedrooms || "";
      qs("m-property").value = selectedLead.property_type || "";
      qs("m-intent").value = selectedLead.intent || "general";
      qs("m-stage").value = stageOf(selectedLead);
      qs("m-status").value = selectedLead.status || "new";
      qs("m-priority").value = normPriority(selectedLead.priority);
      qs("m-source").value = selectedLead.source || "";
      qs("m-need").value = selectedLead.need || selectedLead.last_message || "";
      qs("m-score").value = String(selectedLead.score || 0);
      qs("m-follow").value = formatDate(selectedLead.follow_up_at);
      qs("m-note").value = "";

      const notes = Array.isArray(selectedLead.notes) ? selectedLead.notes : [];
      qs("m-notes").innerHTML = notes.length
        ? notes.slice().reverse().map(n => `<div class="note">${escapeHtml(n.text || "")}<small>${escapeHtml(formatDate(n.at || n.created_at))}</small></div>`).join("")
        : `<div class="note">Sin notas comerciales</div>`;

      qs("modal-bg").style.display = "flex";
    }

    async function saveLead(){
      setLoading(true);
      try{
        const body = {
          name: qs("m-name").value.trim(),
          phone: qs("m-phone").value.trim(),
          email: qs("m-email").value.trim(),
          zone: qs("m-zone").value.trim(),
          budget: qs("m-budget").value.trim(),
          bedrooms: qs("m-bedrooms").value.trim(),
          property_type: qs("m-property").value.trim(),
          intent: qs("m-intent").value,
          stage: qs("m-stage").value,
          status: qs("m-status").value,
          priority: qs("m-priority").value,
          need: qs("m-need").value.trim(),
          message: qs("m-need").value.trim(),
          note: qs("m-note").value.trim()
        };

        let res;
        if (modalMode === "create") {
          res = await fetch(API + "/v1/leads", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
        } else {
          res = await fetch(API + "/v1/leads/" + selectedLead.id, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
        }

        const data = await res.json();
        if (!data.ok){
          toast(data.error || "No se pudo guardar");
          return;
        }

        closeModal();
        await loadAll();
        toast(modalMode === "create" ? "Lead creado" : "Lead actualizado");
      }catch(err){
        toast("Error guardando");
      }finally{
        setLoading(false);
      }
    }

    async function deleteLead(){
      if (!selectedLead?.id) return;
      const ok = confirm("Eliminar este lead?");
      if (!ok) return;

      setLoading(true);
      try{
        const res = await fetch(API + "/v1/leads/" + selectedLead.id, { method: "DELETE" });
        const data = await res.json();
        if (!data.ok){
          toast(data.error || "No se pudo eliminar");
          return;
        }
        closeModal();
        await loadAll();
        toast("Lead eliminado");
      }catch(err){
        toast("Error eliminando");
      }finally{
        setLoading(false);
      }
    }

    async function quickStage(stage){
      if (!selectedLead?.id) return;
      qs("m-stage").value = stage;
      await saveLead();
    }

    async function runCleanup(){
      setLoading(true);
      try{
        const res = await fetch(API + "/v1/admin/cleanup", { method: "POST" });
        const data = await res.json();
        if (!data.ok){
          toast("Error en limpieza");
          return;
        }
        await loadAll();
        toast("CRM limpiado");
      }catch(err){
        toast("Error en limpieza");
      }finally{
        setLoading(false);
      }
    }

    async function runFollowups(){
      setLoading(true);
      try{
        const res = await fetch(API + "/v1/followup/run");
        const data = await res.json();
        if (!data.ok){
          toast("Error ejecutando seguimiento");
          return;
        }
        const n = Array.isArray(data.acciones) ? data.acciones.length : 0;
        toast(`Seguimiento ejecutado: ${n} acciones`);
        await loadAll();
      }catch(err){
        toast("Error ejecutando seguimiento");
      }finally{
        setLoading(false);
      }
    }

    loadAll();
    setInterval(loadAll, 15000);
  </script>
</body>
</html>
