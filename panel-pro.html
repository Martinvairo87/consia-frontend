<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CONSIA PANEL OWNER</title>

<style>
:root{
  --bg:#030712;
  --bg2:#07111f;
  --glass:rgba(255,255,255,.06);
  --text:#e6f6ff;
  --c1:#35d9ff;
  --c2:#7b61ff;
}

html,body{
  margin:0;
  padding:0;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,212,255,.12), transparent),
    radial-gradient(circle at 80% 30%, rgba(123,97,255,.15), transparent),
    var(--bg);
  font-family: system-ui;
  color:var(--text);
}

/* ---------- TITULO ---------- */
.title{
  position:absolute;
  top:40%;
  width:100%;
  text-align:center;
  font-size:42px;
  letter-spacing:2px;
  background: linear-gradient(90deg,var(--c1),var(--c2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ---------- AVATAR ---------- */
.avatar{
  position:fixed;
  bottom:30px;
  right:30px;
  width:220px;
  height:220px;
  border-radius:50%;
  background: radial-gradient(circle,var(--c1),var(--c2));
  box-shadow:0 0 80px rgba(0,212,255,.7);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}

/* ---------- PANEL DATA ---------- */
.panel{
  position:absolute;
  top:20px;
  left:20px;
  padding:20px;
  background:var(--glass);
  backdrop-filter:blur(20px);
  border-radius:20px;
  width:300px;
}

</style>
</head>

<body>

<div class="title">CONSIA PANEL OWNER</div>

<div class="panel" id="panelData">
  <b>Estado:</b> cargando...
</div>

<div class="avatar"></div>

<!-- ENGINE -->
<script src="/command-engine.js"></script>

<script>

const API_URL = "https://api.consia.world";
const OWNER_KEY = "PEGAR_OWNER_KEY";

// INIT ENGINE
const engine = new CONSIA_ENGINE(API_URL, OWNER_KEY);

// ---------- VOZ ----------
const recognition = new webkitSpeechRecognition();
recognition.lang = "es-AR";
recognition.continuous = true;

recognition.onresult = async (event) => {
  const text = event.results[event.results.length - 1][0].transcript;

  console.log("🎤", text);

  const result = await engine.run(text);

  console.log("⚡", result);

  speak(result);
};

recognition.start();

// ---------- RESPUESTA ----------
function speak(data){
  const msg = new SpeechSynthesisUtterance(
    data.ok ? "Acción ejecutada" : "Error en ejecución"
  );
  speechSynthesis.speak(msg);
}

// ---------- DASHBOARD AUTO ----------
async function loadDashboard(){
  const res = await fetch(API_URL + "/v1/platform/global/summary",{
    headers:{ "X-Owner-Key": OWNER_KEY }
  });

  const data = await res.json();

  document.getElementById("panelData").innerHTML = `
    <b>Tenants:</b> ${data.summary.tenants}<br>
    <b>Usuarios:</b> ${data.summary.users}<br>
    <b>Leads:</b> ${data.summary.leads}<br>
    <b>Inventario:</b> ${data.summary.inventory}
  `;
}

loadDashboard();

// ---------- AUTO ENGINE (IA REAL) ----------
setInterval(async ()=>{
  const res = await fetch(API_URL + "/v1/platform/global/summary",{
    headers:{ "X-Owner-Key": OWNER_KEY }
  });

  const data = await res.json();

  if(data.summary.leads > 50){
    await engine.run("crear tenant");
  }

},10000);

</script>

</body>
</html>
