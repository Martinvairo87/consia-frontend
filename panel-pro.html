<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSIA OWNER PANEL</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#030712;
  color:#e6f6ff;
  overflow:hidden;
}

/* Fondo tipo IA */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(53,217,255,.15), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(123,97,255,.15), transparent 40%),
    #030712;
  z-index:-1;
}

/* Panel */
.panel{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

h1{
  font-size:48px;
  background:linear-gradient(90deg,#35d9ff,#7b61ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.data{
  margin-top:20px;
  font-size:18px;
  opacity:.8;
}

/* Avatar flotante */
#avatar{
  position:fixed;
  bottom:20px;
  right:20px;
  width:160px;
  height:160px;
  border-radius:50%;
  background:url("https://i.imgur.com/9Xn4Y6F.png") center/cover;
  box-shadow:0 0 60px rgba(53,217,255,.5);
  animation:float 4s ease-in-out infinite;
  cursor:pointer;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

/* HUD Iron Man */
.hud{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  border:1px solid rgba(53,217,255,.1);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="panel">
  <h1>CONSIA PANEL OWNER</h1>
  <div id="panelData" class="data">Cargando sistema...</div>
</div>

<div id="avatar"></div>
<div class="hud"></div>

<script>
const API_URL = "https://api.consia.world";
const OWNER_KEY = "TU_OWNER_KEY";

/* Dashboard */
async function loadDashboard(){
  try{
    const res = await fetch(API_URL + "/v1/platform/global/summary",{
      headers:{ "X-Owner-Key": OWNER_KEY }
    });
    const data = await res.json();

    document.getElementById("panelData").innerHTML = `
    Tenants: ${data.summary.tenants}<br>
    Usuarios: ${data.summary.users}<br>
    Leads: ${data.summary.leads}<br>
    Inventario: ${data.summary.inventory}
    `;
  }catch(e){
    document.getElementById("panelData").innerText="Sistema online";
  }
}

loadDashboard();
setInterval(loadDashboard,10000);

/* Motor IA */
window.engine = {
  async run(cmd){
    console.log("CONSIA ejecutando:",cmd);
  }
};
</script>

<script src="/avatar-system.js"></script>

</body>
</html>
